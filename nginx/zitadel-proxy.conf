# Proxy for Zitadel — rewrites Host to match EXTERNALDOMAIN=localhost.
# Docker service-to-service calls arrive with Host: <service-name>, which Zitadel
# rejects when EXTERNALDOMAIN=localhost. This proxy corrects the Host header so
# internal services (e.g. Hasura fetching JWKs) can reach Zitadel without special
# client-side configuration.
server {
    listen 8081;

    location / {
        proxy_pass http://zitadel:8080;
        proxy_set_header Host localhost:8080;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}
