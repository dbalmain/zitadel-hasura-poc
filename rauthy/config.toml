# Rauthy configuration — HTTP dev mode POC
# Secrets (ENC_KEYS, BOOTSTRAP_*) are provided via environment variables.

# Allow refresh tokens to be used immediately after issuance
disable_refresh_token_nbf = true

pub_url = "http://localhost:8880"
listen_scheme = "http"
http_danger_unencrypted = true
cookie_mode = "danger-insecure"

# hiqlite (Rauthy's embedded Raft-SQLite engine) — mandatory for single-node
[cluster]
node_id     = 1
nodes       = "1 localhost:8100 localhost:8200"
secret_raft = "RauthyRaftSecretForPOCDevelopmentOnly123456789"
secret_api  = "RauthyApiSecretForPOCDevelopmentOnly1234567890"

# WebAuthn — mandatory (even if not used; rp_id must match pub_url domain)
[webauthn]
rp_id     = "localhost"
rp_name   = "Rauthy POC"
rp_origin = "http://localhost:8880"
