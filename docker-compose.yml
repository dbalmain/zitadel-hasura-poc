version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  rauthy:
    image: ghcr.io/sebadob/rauthy:0.34.3
    environment:
      # HTTP mode â€” no TLS (DEV_MODE intentionally omitted; it suppresses BOOTSTRAP_API_KEY)
      - PUB_URL=localhost:8880
      - LISTEN_SCHEME=http
      - HTTP_DANGER_UNENCRYPTED=true
      - COOKIE_MODE=danger-insecure
      # Admin credentials
      - BOOTSTRAP_ADMIN_PASSWORD_PLAIN=Password1!
      # Bootstrap API key for programmatic setup
      # JSON: {"name":"bootstrap","exp":1893456000,"access":[Clients,Users,Roles]}
      - BOOTSTRAP_API_
      - BOOTSTRAP_API_KEY_SECRET=BootstrapAPIKeySecretForRauthyPOCDevelopmentOnly1234567890ABCDEFg
      - DISABLE_REFRESH_TOKEN_NBF=true
      # Encryption key for secrets stored in DB (required)
      - ENC_KEYS=bVCyTsGaggVy5yqQ/UzluN29DZW41M3hTSkx6Y3NtZmRuQkR2TnJxUTYzcjQ=
      - ENC_KEY_ACTIVE=bVCyTsGaggVy5yqQ
    ports:
      - "8880:8080"
    volumes:
      - rauthy_data:/app/data
      - ./rauthy/config.toml:/app/config.toml:ro
    # No healthcheck â€” the setup script polls /health itself via waitForRauthy()

  role-validator:
    build: ./role-validator
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app
      PORT: 3300
      RAUTHY_URL: http://rauthy:8080
      # API key header value: "API-Key <name>$<secret>"
      RAUTHY_API_KEY: "bootstrap$$BootstrapAPIKeySecretForRauthyPOCDevelopmentOnly1234567890ABCDEFg"
      RAUTHY_CLIENT_ID: poc-app
    depends_on:
      postgres:
        condition: service_healthy
      rauthy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3300:3300"

  # Phase 1: Rauthy config + DB seed. Must complete before Hasura starts.
  setup:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app
      - ./frontend:/frontend
    environment:
      RAUTHY_URL: http://rauthy:8080
      RAUTHY_API_KEY: "bootstrap$$BootstrapAPIKeySecretForRauthyPOCDevelopmentOnly1234567890ABCDEFg"
      APP_DB_URL: postgres://postgres:postgres@postgres:5432/app
    command: sh -c "npm install --prefer-offline && node setup-rauthy.js"
    depends_on:
      rauthy:
        condition: service_started
      postgres:
        condition: service_healthy

  hasura:
    image: hasura/graphql-engine:v2.38.0
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/app
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: adminsecret
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      # Rauthy emits flat JWT claims; use claims_map to extract Hasura headers.
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"RS256","jwk_url":"http://rauthy:8080/auth/v1/oidc/certs","claims_map":{"x-hasura-default-role":{"path":"$.custom.active_role"},"x-hasura-allowed-roles":{"path":"$.custom.allowed_roles"},"x-hasura-user-id":{"path":"$.sub"},"x-hasura-branch-id":{"path":"$.custom.active_branch_id"}}}'
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    ports:
      - "8090:8080"

  # Phase 2: apply Hasura table tracking + permissions after Hasura is up
  hasura-setup:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app
    environment:
      HASURA_ENDPOINT: http://hasura:8080
      HASURA_ADMIN_SECRET: adminsecret
    command: sh -c "npm install --prefer-offline && node setup-hasura.js"
    depends_on:
      hasura:
        condition: service_started

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3301:80"

volumes:
  postgres_data:
  rauthy_data:
