services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  mailpit:
    image: axllent/mailpit
    ports:
      - "8025:8025"  # Web UI — check recovery emails here
      - "1025:1025"  # SMTP

  kratos:
    image: oryd/kratos:v1.1.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./kratos:/etc/kratos:ro
    environment:
      DSN: postgres://postgres:postgres@postgres:5432/kratos?sslmode=disable
      LOG_LEVEL: info
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kratos migrate sql -e --yes --config /etc/kratos/kratos.yml &&
       exec kratos serve --config /etc/kratos/kratos.yml --dev --watch-courier"
    ports:
      - "4433:4433"  # Public API
      - "4434:4434"  # Admin API
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4433/health/ready || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 60

  # Phase 1: create Kratos identities + seed app DB
  setup:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app
      - ./frontend:/frontend
    environment:
      KRATOS_ADMIN_URL: http://kratos:4434
      APP_DB_URL: postgres://postgres:postgres@postgres:5432/app
    command: sh -c "npm install --prefer-offline && node setup-kratos.js"
    depends_on:
      kratos:
        condition: service_healthy
      postgres:
        condition: service_healthy

  security-proxy:
    build: ./security-proxy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/app
      KRATOS_PUBLIC_URL: http://kratos:4433
      KRATOS_ADMIN_URL: http://kratos:4434
      HASURA_URL: http://hasura:8080/v1/graphql
      PORT: "3300"
      RUST_LOG: info
    depends_on:
      postgres:
        condition: service_healthy
      kratos:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3300/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "3300:3300"

  hasura:
    image: hasura/graphql-engine:v2.38.0
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgres@postgres:5432/app
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: adminsecret
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      # Security proxy mints JWTs with standard https://hasura.io/jwt/claims namespace
      HASURA_GRAPHQL_JWT_SECRET: >
        {"type":"RS256","jwk_url":"http://security-proxy:3300/.well-known/jwks.json"}
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
      security-proxy:
        condition: service_healthy
    ports:
      - "8090:8080"

  # Phase 2: apply Hasura table tracking + permissions after Hasura is up
  hasura-setup:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./scripts:/app
    environment:
      HASURA_ENDPOINT: http://hasura:8080
      HASURA_ADMIN_SECRET: adminsecret
    command: sh -c "npm install --prefer-offline && node setup-hasura.js"
    depends_on:
      hasura:
        condition: service_started

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3301:80"

volumes:
  postgres_data:
