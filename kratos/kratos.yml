dsn: postgres://postgres:postgres@postgres:5432/kratos?sslmode=disable

serve:
  public:
    base_url: http://kratos:4433/
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:3300
        - http://localhost:3301
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Cookie
        - Content-Type
      exposed_headers:
        - Content-Type
        - Set-Cookie
  admin:
    base_url: http://kratos:4434/

selfservice:
  default_browser_return_url: http://localhost:3301/
  allowed_return_urls:
    - http://localhost:3301/

  methods:
    password:
      enabled: true
      config:
        haveibeenpwned_enabled: false
    code:
      enabled: true
      config:
        lifespan: 15m

  flows:
    error:
      ui_url: http://localhost:3301/
    settings:
      ui_url: http://localhost:3301/
      privileged_session_max_age: 15m
    recovery:
      enabled: true
      ui_url: http://localhost:3301/
      use: code
    verification:
      enabled: false
      ui_url: http://localhost:3301/
    logout: {}
    login:
      ui_url: http://localhost:3301/
      lifespan: 10m
    registration:
      lifespan: 10m
      ui_url: http://localhost:3301/

session:
  lifespan: 24h

log:
  level: info
  format: text

secrets:
  cookie:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
  cipher:
    - 32-LONG-SECRET-NOT-SECURE-AT-ALL

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 8

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/kratos/identity.schema.json

courier:
  smtp:
    connection_uri: smtp://mailpit:1025/?disable_starttls=true
    from_address: noreply@poc.local
    from_name: POC
