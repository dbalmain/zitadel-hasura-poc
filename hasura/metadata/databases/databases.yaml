- name: default
  kind: postgres
  configuration:
    connection_info:
      database_url:
        from_env: HASURA_GRAPHQL_DATABASE_URL
      pool_settings:
        idle_timeout: 180
        max_connections: 50
  tables:
    - "!include default/tables/public_branches.yaml"
    - "!include default/tables/public_user_branch_roles.yaml"
    - "!include default/tables/public_users.yaml"
